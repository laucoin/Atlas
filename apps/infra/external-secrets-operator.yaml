apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: external-secrets
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://charts.external-secrets.io
    chart: external-secrets
    targetRevision: 2.6.0
    helm:
      releaseName: external-secrets
      valuesObject:
        installCRDs: true
        # Expose controller metrics to Prometheus (cluster-wide
        # serviceMonitorSelector picks this up); rendered by the External
        # Secrets Grafana dashboard (gnetId 21640).
        serviceMonitor:
          enabled: true
          interval: 30s
  destination:
    server: https://kubernetes.default.svc
    namespace: external-secrets
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      # The secretstores/clustersecretstores CRDs embed every provider's
      # schema and exceed Argo's client-side apply limit (the 256 KiB
      # last-applied-configuration annotation). Without server-side apply
      # they silently fail to install and the operator crash-loops with
      # `no matches for kind "ClusterSecretStore"`, taking every
      # ExternalSecret down with it.
      - ServerSideApply=true
