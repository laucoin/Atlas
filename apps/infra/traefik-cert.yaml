apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: traefik-tls
  namespace: traefik
spec:
  secretName: traefik-tls
  # Switch issuerRef.name to letsencrypt-staging to debug ACME without
  # burning production rate limits; restore to letsencrypt-prod for
  # browser-trusted certs.
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  dnsNames:
    - traefik.atlas.laucoin.fr
