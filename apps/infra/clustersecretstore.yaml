# Requires the `infisical-credentials` Secret in the external-secrets
# namespace. Create it ONCE out-of-band AFTER Infisical is up and you
# have generated a machine identity in the Infisical UI:
#
#   kubectl create secret generic infisical-credentials \
#     --namespace external-secrets \
#     --from-literal=clientId=<machine-identity-client-id> \
#     --from-literal=clientSecret=<machine-identity-client-secret>
#
# Update projectSlug / environmentSlug below to match the Infisical
# project and environment you created.
apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  annotations:
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
  name: infisical
spec:
  provider:
    infisical:
      auth:
        universalAuthCredentials:
          clientId:
            name: infisical-credentials
            key: clientId
            namespace: external-secrets
          clientSecret:
            name: infisical-credentials
            key: clientSecret
            namespace: external-secrets
      secretsScope:
        projectSlug: atlas
        environmentSlug: prod
        secretsPath: /
      # Must match the Service the infisical-standalone chart creates:
      # <release>-infisical-standalone-infisical on port 8080.
      hostAPI: http://infisical-infisical-standalone-infisical.infisical.svc.cluster.local:8080
