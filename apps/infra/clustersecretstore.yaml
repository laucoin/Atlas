# External Secrets Operator wiring for Infisical (project `atlas`, env `prod`).
# Secrets are organised into one Infisical folder per service (/authentik,
# /harbor, /grafana, /argocd, /velero); each folder is exposed as its own
# ClusterSecretStore so every ExternalSecret reads only its app's path. All
# stores authenticate with the read-only `eso` machine identity, whose
# Universal Auth credentials live in the `infisical-credentials` Secret in the
# external-secrets namespace — create it once out-of-band:
#   kubectl create secret generic infisical-credentials -n external-secrets \
#     --from-literal=clientId=<eso-id> --from-literal=clientSecret=<eso-secret>
# The folders themselves are populated by the write-capable `seeder` identity
# (see apps/platform/infisical-seeder.yaml).
apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: infisical-authentik
  annotations:
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  provider:
    infisical:
      auth:
        universalAuthCredentials:
          clientId: { name: infisical-credentials, key: clientId, namespace: external-secrets }
          clientSecret: { name: infisical-credentials, key: clientSecret, namespace: external-secrets }
      secretsScope: { projectSlug: atlas, environmentSlug: prod, secretsPath: /authentik }
      hostAPI: http://infisical-infisical-standalone-infisical.infisical.svc.cluster.local:8080
---
