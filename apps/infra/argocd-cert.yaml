apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: argocd-tls
  namespace: argocd
spec:
  secretName: argocd-tls
  # Switch issuerRef.name to letsencrypt-staging to debug ACME without
  # burning production rate limits; restore to letsencrypt-prod for
  # browser-trusted certs.
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  dnsNames:
    - argo.atlas.laucoin.fr
