# Argo CD OIDC client credentials, materialized by ESO from the Infisical
# /argocd folder (seeded by the infisical-seeder Job). The same values back the
# cd-provider created by the Authentik blueprint. The app.kubernetes.io/part-of:
# argocd label is required: Argo CD only resolves $argocd-oidc:* references (used
# in bootstrap/argo/main.tf oidc.config) from Secrets carrying it.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: argocd-oidc
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  refreshInterval: 1m
  secretStoreRef:
    name: infisical-argocd
    kind: ClusterSecretStore
  target:
    name: argocd-oidc
    creationPolicy: Owner
    template:
      metadata:
        labels:
          app.kubernetes.io/part-of: argocd
  data:
    - secretKey: clientId
      remoteRef: { key: ARGOCD_OIDC_CLIENT_ID }
    - secretKey: clientSecret
      remoteRef: { key: ARGOCD_OIDC_CLIENT_SECRET }
