# Argo CD OIDC (Authentik) client credentials, materialized from Infisical
# via ESO. Populate these keys in your Infisical project (atlas / prod):
#   ARGOCD_OIDC_CLIENT_ID
#   ARGOCD_OIDC_CLIENT_SECRET
#
# First mint an OAuth2/OpenID Provider + Application in Authentik with
# redirect URI https://argo.atlas.laucoin.fr/auth/callback ; capture the
# client_id and client_secret it issues.
#
# The `app.kubernetes.io/part-of: argocd` label is required: Argo CD only
# resolves `$argocd-oidc:<key>` references (used in bootstrap/argo/main.tf
# oidc.config) from Secrets carrying that label.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  annotations:
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
  name: argocd-oidc
  namespace: argocd
spec:
  refreshInterval: 1m
  secretStoreRef:
    name: infisical
    kind: ClusterSecretStore
  target:
    name: argocd-oidc
    creationPolicy: Owner
    template:
      metadata:
        labels:
          app.kubernetes.io/part-of: argocd
  data:
    - secretKey: clientId
      remoteRef:
        key: ARGOCD_OIDC_CLIENT_ID
    - secretKey: clientSecret
      remoteRef:
        key: ARGOCD_OIDC_CLIENT_SECRET
