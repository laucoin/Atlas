# Grafana's admin + OIDC credentials, materialized by ESO from the Infisical
# /grafana folder (seeded by the infisical-seeder Job) into the single
# `grafana-bootstrap` Secret the chart consumes (admin.existingSecret +
# extraSecretMounts in kube-prometheus-stack.yaml).
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: grafana-bootstrap
  namespace: monitoring
  annotations:
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  refreshInterval: 1m
  secretStoreRef:
    name: infisical-grafana
    kind: ClusterSecretStore
  target:
    name: grafana-bootstrap
    creationPolicy: Owner
  data:
    - secretKey: admin-user
      remoteRef: { key: GRAFANA_ADMIN_USER }
    - secretKey: admin-password
      remoteRef: { key: GRAFANA_ADMIN_PASSWORD }
    - secretKey: oidc-client-id
      remoteRef: { key: GRAFANA_OIDC_CLIENT_ID }
    - secretKey: oidc-client-secret
      remoteRef: { key: GRAFANA_OIDC_CLIENT_SECRET }
