# kube-prometheus-stack (Prometheus, Alertmanager, Grafana, Loki datasource).
# Grafana's admin + OIDC creds come from the `grafana-bootstrap` Secret, which
# ESO materializes from the Infisical /grafana folder (all four keys are
# generated by the infisical-seeder Job; see ./grafana-externalsecret.yaml).
# The matching Authentik provider (observability-provider) is created
# declaratively in ../identity/authentik-blueprints.yaml, so SSO needs no
# manual step. Native login is disabled (disable_login_form + auto_login) to
# force Authentik; the local `admin` stays as break-glass (re-enable the form
# temporarily, or use the API). The Prometheus initContainer chowns its
# hostPath-backed data dir so it can write it (see the comment there).
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kube-prometheus-stack
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://prometheus-community.github.io/helm-charts
    chart: kube-prometheus-stack
    targetRevision: 86.2.3
    helm:
      releaseName: kube-prometheus-stack
      valuesObject:
        prometheus:
          prometheusSpec:
            # local-path PVs are hostPath-backed, so kubelet ignores the
            # pod's fsGroup (2000) and never chowns the volume. The Prometheus
            # container mounts the data volume with subPath=prometheus-db, and
            # kubelet creates that subPath dir root-owned, so Prometheus
            # (uid 1000) can't write it → "open /prometheus/queries.active:
            # permission denied" → CrashLoopBackOff.
            # Chown the data dir before Prometheus starts; runs every boot so
            # it self-heals and survives re-provisioning. The mount MUST use
            # the same subPath as the Prometheus container — kubelet creates
            # the subPath dir before this init container runs, so we chown the
            # exact directory Prometheus will use (chowning the volume root is
            # not enough; the root-owned subPath dir is created afterward).
            initContainers:
              - name: chown-prometheus-data
                image: busybox:1.37
                command: ["sh", "-c", "chown -R 1000:2000 /prometheus"]
                securityContext:
                  runAsNonRoot: false
                  runAsUser: 0
                  allowPrivilegeEscalation: false
                  capabilities:
                    drop: ["ALL"]
                    add: ["CHOWN"]
                  seccompProfile:
                    type: RuntimeDefault
                volumeMounts:
                  - name: prometheus-kube-prometheus-stack-prometheus-db
                    mountPath: /prometheus
                    subPath: prometheus-db
            serviceMonitorSelector: {}
            serviceMonitorNamespaceSelector: {}
            podMonitorSelector: {}
            podMonitorNamespaceSelector: {}
            ruleSelector: {}
            ruleNamespaceSelector: {}
            retention: 14d
            storageSpec:
              volumeClaimTemplate:
                spec:
                  storageClassName: local-path
                  accessModes: [ReadWriteOnce]
                  resources:
                    requests:
                      storage: 30Gi
        alertmanager:
          alertmanagerSpec:
            storage:
              volumeClaimTemplate:
                spec:
                  storageClassName: local-path
                  accessModes: [ReadWriteOnce]
                  resources:
                    requests:
                      storage: 2Gi
        grafana:
          admin:
            existingSecret: grafana-bootstrap
            userKey: admin-user
            passwordKey: admin-password
          persistence:
            enabled: true
            storageClassName: local-path
            size: 5Gi
          sidecar:
            dashboards:
              enabled: true
              searchNamespace: ALL
              label: grafana_dashboard
            datasources:
              enabled: true
              searchNamespace: ALL
          extraSecretMounts:
            - name: grafana-oidc
              secretName: grafana-bootstrap
              defaultMode: 0440
              mountPath: /etc/secrets/oidc
              readOnly: true
          grafana.ini:
            server:
              root_url: https://grafana.atlas.laucoin.fr
            auth:
              disable_login_form: true
              oauth_auto_login: true
            auth.generic_oauth:
              enabled: true
              auto_login: true
              name: Authentik
              allow_sign_up: true
              scopes: "openid profile email groups"
              # Grafana org role is mapped from Authentik groups named after the
              # in-app role: `grafana-admins` -> Admin, `grafana-editors` ->
              # Editor, `grafana-viewers` -> Viewer. The first match wins;
              # role_attribute_strict stays off so an unmatched user still logs
              # in as Viewer rather than being denied.
              role_attribute_path: "contains(groups[*], 'grafana-admins') && 'Admin' || contains(groups[*], 'grafana-editors') && 'Editor' || 'Viewer'"
              auth_url: https://authentik.atlas.laucoin.fr/application/o/authorize/
              token_url: https://authentik.atlas.laucoin.fr/application/o/token/
              api_url: https://authentik.atlas.laucoin.fr/application/o/userinfo/
              client_id: "$__file{/etc/secrets/oidc/oidc-client-id}"
              client_secret: "$__file{/etc/secrets/oidc/oidc-client-secret}"
          additionalDataSources:
            - name: Loki
              type: loki
              access: proxy
              url: http://loki.monitoring.svc.cluster.local:3100
          # Per-service dashboards, one curated community dashboard per app.
          # The chart's init container downloads each by its grafana.com ID at
          # startup (needs egress to grafana.com) and the provider below loads
          # them into a "Services" folder — independent of, and coexisting with,
          # the dashboard sidecar above. Cluster/node/kube dashboards already
          # ship with this chart, so only the app-level ones are added here.
          # gnetId + revision are pinned (looked up on grafana.com) so renders
          # are reproducible; `datasource` maps each dashboard's DS_* template
          # var onto the datasources provisioned above (Prometheus default, Loki
          # added). ServiceMonitors that feed these live alongside each app.
          dashboardProviders:
            dashboardproviders.yaml:
              apiVersion: 1
              providers:
                - name: services
                  orgId: 1
                  folder: Services
                  type: file
                  disableDeletion: false
                  editable: true
                  options:
                    path: /var/lib/grafana/dashboards/services
          dashboards:
            services:
              traefik: { gnetId: 17346, revision: 9, datasource: Prometheus }
              argocd: { gnetId: 14584, revision: 1, datasource: Prometheus }
              harbor: { gnetId: 14075, revision: 2, datasource: Prometheus }
              authentik: { gnetId: 14837, revision: 2, datasource: Prometheus }
              velero: { gnetId: 15469, revision: 1, datasource: Prometheus }
              external-secrets: { gnetId: 21640, revision: 4, datasource: Prometheus }
              cert-manager: { gnetId: 11001, revision: 1, datasource: Prometheus }
              loki: { gnetId: 13639, revision: 2, datasource: Loki }
              # New services (see ../home/ and ../platform/sonarqube*).
              home-assistant: { gnetId: 15832, revision: 2, datasource: Prometheus }
              sonarqube: { gnetId: 17641, revision: 1, datasource: Prometheus }
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
