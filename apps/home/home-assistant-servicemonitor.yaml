# Scrapes Home Assistant's Prometheus endpoint (/api/prometheus). That endpoint
# is guarded by a long-lived access token, which can only be minted in the HA UI
# after first boot — so this is a one-time manual step:
#   1. HA UI → your profile → "Long-lived access tokens" → create one.
#   2. kubectl -n home-assistant create secret generic home-assistant-prometheus \
#        --from-literal=token=<LLAT>
# Until that Secret exists the target stays down and the Grafana dashboard
# (gnetId 15832) is empty. The empty serviceMonitorSelector ({}) on Prometheus
# means no extra label is needed, but `release` is set for consistency.
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  annotations:
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
  name: home-assistant
  namespace: home-assistant
  labels:
    release: kube-prometheus-stack
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: home-assistant
  endpoints:
    - port: http
      path: /api/prometheus
      interval: 30s
      authorization:
        type: Bearer
        credentials:
          name: home-assistant-prometheus
          key: token
