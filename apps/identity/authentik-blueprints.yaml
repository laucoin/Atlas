# Declarative Authentik configuration, auto-applied by the Authentik worker on
# startup (mounted via blueprints.configMaps in ./authentik.yaml; only `.yaml`
# keys are discovered). It replaces every manual "create a provider/application/
# scope mapping in the UI" step: it defines the `groups` scope mapping, the
# OAuth2 providers + applications for Harbor/Grafana/Argo CD, a proxy
# (forward-auth) provider for the Traefik dashboard bound to the embedded
# outpost, and the three `*-admins` groups. Each provider's client id/secret is pinned via !Env to the
# values injected through authentik.yaml's envFrom (the same Infisical values
# the apps consume), so both sides of every handshake always agree. The
# bootstrap admin (akadmin) is added to each admin group so SSO never locks you
# out, without disturbing its other (superuser) memberships.
apiVersion: v1
kind: ConfigMap
metadata:
  name: authentik-blueprints
  namespace: authentik
data:
  atlas-sso.yaml: |
    version: 1
    metadata:
      name: atlas-sso
      labels:
        blueprints.goauthentik.io/instantiate: "true"
    entries:
      - id: scope-groups
        model: authentik_providers_oauth2.scopemapping
        identifiers:
          name: "OAuth Mapping: Groups"
        attrs:
          scope_name: groups
          description: "Authentik groups of the user"
          expression: |
            return [group.name for group in request.user.ak_groups.all()]

      - id: group-grafana-admins
        model: authentik_core.group
        identifiers:
          name: grafana-admins
        attrs:
          users:
            - !Find [authentik_core.user, [username, akadmin]]
      # Editor/Viewer groups map to Grafana's matching org roles (see
      # role_attribute_path in kube-prometheus-stack.yaml). No forced members:
      # akadmin is already an Admin via grafana-admins; assign other users here.
      - id: group-grafana-editors
        model: authentik_core.group
        identifiers:
          name: grafana-editors
      - id: group-grafana-viewers
        model: authentik_core.group
        identifiers:
          name: grafana-viewers
      - id: group-argocd-admins
        model: authentik_core.group
        identifiers:
          name: argocd-admins
        attrs:
          users:
            - !Find [authentik_core.user, [username, akadmin]]
      - id: group-harbor-admins
        model: authentik_core.group
        identifiers:
          name: harbor-admins
        attrs:
          users:
            - !Find [authentik_core.user, [username, akadmin]]

      - id: provider-harbor
        model: authentik_providers_oauth2.oauth2provider
        identifiers:
          name: registry-provider
        attrs:
          authorization_flow:
            !Find [authentik_flows.flow, [slug, default-provider-authorization-explicit-consent]]
          invalidation_flow:
            !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow]]
          client_type: confidential
          client_id: !Env HARBOR_OIDC_CLIENT_ID
          client_secret: !Env HARBOR_OIDC_CLIENT_SECRET
          signing_key:
            !Find [authentik_crypto.certificatekeypair, [name, authentik Self-signed Certificate]]
          redirect_uris:
            - matching_mode: strict
              url: https://harbor.atlas.laucoin.fr/c/oidc/callback
          property_mappings:
            - !Find [authentik_providers_oauth2.scopemapping, [managed, goauthentik.io/providers/oauth2/scope-openid]]
            - !Find [authentik_providers_oauth2.scopemapping, [managed, goauthentik.io/providers/oauth2/scope-email]]
            - !Find [authentik_providers_oauth2.scopemapping, [managed, goauthentik.io/providers/oauth2/scope-profile]]
            - !Find [authentik_providers_oauth2.scopemapping, [managed, goauthentik.io/providers/oauth2/scope-offline_access]]
            - !KeyOf scope-groups
      - id: app-harbor
        model: authentik_core.application
        identifiers:
          slug: harbor
        attrs:
          name: Harbor
          provider: !KeyOf provider-harbor
          meta_launch_url: https://harbor.atlas.laucoin.fr

      - id: provider-grafana
        model: authentik_providers_oauth2.oauth2provider
        identifiers:
          name: observability-provider
        attrs:
          authorization_flow:
            !Find [authentik_flows.flow, [slug, default-provider-authorization-explicit-consent]]
          invalidation_flow:
            !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow]]
          client_type: confidential
          client_id: !Env GRAFANA_OIDC_CLIENT_ID
          client_secret: !Env GRAFANA_OIDC_CLIENT_SECRET
          signing_key:
            !Find [authentik_crypto.certificatekeypair, [name, authentik Self-signed Certificate]]
          redirect_uris:
            - matching_mode: strict
              url: https://grafana.atlas.laucoin.fr/login/generic_oauth
          property_mappings:
            - !Find [authentik_providers_oauth2.scopemapping, [managed, goauthentik.io/providers/oauth2/scope-openid]]
            - !Find [authentik_providers_oauth2.scopemapping, [managed, goauthentik.io/providers/oauth2/scope-email]]
            - !Find [authentik_providers_oauth2.scopemapping, [managed, goauthentik.io/providers/oauth2/scope-profile]]
            - !KeyOf scope-groups
      - id: app-grafana
        model: authentik_core.application
        identifiers:
          slug: grafana
        attrs:
          name: Grafana
          provider: !KeyOf provider-grafana
          meta_launch_url: https://grafana.atlas.laucoin.fr

      - id: provider-argocd
        model: authentik_providers_oauth2.oauth2provider
        identifiers:
          name: cd-provider
        attrs:
          authorization_flow:
            !Find [authentik_flows.flow, [slug, default-provider-authorization-explicit-consent]]
          invalidation_flow:
            !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow]]
          client_type: confidential
          client_id: !Env ARGOCD_OIDC_CLIENT_ID
          client_secret: !Env ARGOCD_OIDC_CLIENT_SECRET
          signing_key:
            !Find [authentik_crypto.certificatekeypair, [name, authentik Self-signed Certificate]]
          redirect_uris:
            - matching_mode: strict
              url: https://argo.atlas.laucoin.fr/auth/callback
          property_mappings:
            - !Find [authentik_providers_oauth2.scopemapping, [managed, goauthentik.io/providers/oauth2/scope-openid]]
            - !Find [authentik_providers_oauth2.scopemapping, [managed, goauthentik.io/providers/oauth2/scope-email]]
            - !Find [authentik_providers_oauth2.scopemapping, [managed, goauthentik.io/providers/oauth2/scope-profile]]
            - !KeyOf scope-groups
      - id: app-argocd
        model: authentik_core.application
        identifiers:
          slug: argo-cd
        attrs:
          name: Argo CD
          provider: !KeyOf provider-argocd
          meta_launch_url: https://argo.atlas.laucoin.fr

      # Traefik dashboard is protected by forward-auth (no OIDC client of its
      # own): a proxy provider in forward_single mode + the embedded outpost
      # serve the Traefik IngressRoute middleware
      # (apps/infra/traefik-dashboard-ingressroute.yaml). Access is restricted
      # to members of the traefik-users group via a policy binding on the
      # application (below); akadmin is seeded so the operator keeps access.
      - id: group-traefik-users
        model: authentik_core.group
        identifiers:
          name: traefik-users
        attrs:
          users:
            - !Find [authentik_core.user, [username, akadmin]]
      - id: provider-traefik
        model: authentik_providers_proxy.proxyprovider
        identifiers:
          name: traefik-provider
        attrs:
          authorization_flow:
            !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
          invalidation_flow:
            !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow]]
          mode: forward_single
          external_host: https://traefik.atlas.laucoin.fr
      - id: app-traefik
        model: authentik_core.application
        identifiers:
          slug: traefik
        attrs:
          name: Traefik
          provider: !KeyOf provider-traefik
          meta_launch_url: https://traefik.atlas.laucoin.fr
      # Only members of traefik-users may pass forward-auth for the dashboard.
      # A group-scoped policy binding on the application enforces this; without
      # it, any authenticated Authentik user would be allowed through.
      - id: binding-traefik-users
        model: authentik_policies.policybinding
        identifiers:
          target: !KeyOf app-traefik
          group: !KeyOf group-traefik-users
          order: 0
        attrs:
          enabled: true
      # Bind the proxy provider to the built-in embedded outpost so
      # authentik-server answers /outpost.goauthentik.io/auth/traefik.
      - id: outpost-embedded
        model: authentik_outposts.outpost
        identifiers:
          name: authentik Embedded Outpost
        attrs:
          providers:
            - !KeyOf provider-traefik
