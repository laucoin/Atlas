# Authentik (the SSO IdP), installed by Argo CD from the official chart.
# It boots entirely from Infisical-sourced secrets (no manual bootstrap): the
# four envFrom Secrets are ESO-materialized from the /authentik, /harbor,
# /grafana and /argocd folders (see ./authentik-externalsecret.yaml) and carry
# Authentik's own keys plus every app's OIDC client id/secret. The bundled
# PostgreSQL shares AUTHENTIK_POSTGRESQL__PASSWORD via existingSecret so both
# block until the Secret exists (no DB-password race). SSO objects (scope
# mapping, providers, applications, admin groups) are created declaratively
# from the blueprint ConfigMap (./authentik-blueprints.yaml). North-south
# routing is Traefik's job, so the chart's own ingress is disabled.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: authentik
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://charts.goauthentik.io
    chart: authentik
    targetRevision: 2026.5.3
    helm:
      releaseName: authentik
      valuesObject:
        global:
          envFrom:
            - secretRef:
                name: authentik-bootstrap
            - secretRef:
                name: authentik-oidc-harbor
            - secretRef:
                name: authentik-oidc-grafana
            - secretRef:
                name: authentik-oidc-argocd
        blueprints:
          configMaps:
            - authentik-blueprints
        authentik:
          log_level: info
          bootstrap_email: admin@atlas.laucoin.fr
        server:
          ingress:
            enabled: false
        postgresql:
          enabled: true
          auth:
            username: authentik
            database: authentik
            existingSecret: authentik-bootstrap
            secretKeys:
              adminPasswordKey: AUTHENTIK_POSTGRESQL__PASSWORD
              userPasswordKey: AUTHENTIK_POSTGRESQL__PASSWORD
  destination:
    server: https://kubernetes.default.svc
    namespace: authentik
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
