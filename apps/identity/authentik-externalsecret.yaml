# Secrets the Authentik pod consumes via global.envFrom (see authentik.yaml).
# `authentik-bootstrap` holds Authentik's own keys from the /authentik folder.
# Because Authentik is the IdP it also needs every app's OIDC client id/secret
# (the blueprint pins each provider to these via !Env), so the three
# `authentik-oidc-*` Secrets pull those pairs from each app's own folder. All
# values are generated by the seeder; ESO keeps both sides of every handshake
# in sync because the app reads the identical keys from the same folder.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: authentik-bootstrap
  namespace: authentik
  annotations:
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  refreshInterval: 1m
  secretStoreRef:
    name: infisical-authentik
    kind: ClusterSecretStore
  target:
    name: authentik-bootstrap
    creationPolicy: Owner
  data:
    - secretKey: AUTHENTIK_SECRET_KEY
      remoteRef: { key: AUTHENTIK_SECRET_KEY }
    - secretKey: AUTHENTIK_BOOTSTRAP_PASSWORD
      remoteRef: { key: AUTHENTIK_BOOTSTRAP_PASSWORD }
    - secretKey: AUTHENTIK_BOOTSTRAP_TOKEN
      remoteRef: { key: AUTHENTIK_BOOTSTRAP_TOKEN }
    - secretKey: AUTHENTIK_POSTGRESQL__PASSWORD
      remoteRef: { key: AUTHENTIK_POSTGRESQL__PASSWORD }
---
