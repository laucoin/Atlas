# SonarQube Community Build — static code analysis. Deployed with native login
# (no Authentik SSO). PostgreSQL is provided by the CNPG Cluster in
# ./sonarqube-postgres.yaml; SonarQube reads the CNPG-generated
# `sonarqube-postgres-app` Secret via jdbcOverwrite. Elasticsearch needs
# vm.max_map_count=524288, set at the node level via Talos
# (bootstrap/talos/patches/common.yaml.tftpl), so the privileged initSysctl
# container is disabled here and the namespace stays under baseline PSS.
# Metrics: the native /api/monitoring endpoint (guarded by the monitoring
# passcode from Infisical, see ./sonarqube-externalsecret.yaml) is scraped by
# the chart's PodMonitor and rendered by Grafana (gnetId 17641). TLS/routing:
# ./sonarqube-cert.yaml + ./sonarqube-ingressroute.yaml.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: sonarqube
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://SonarSource.github.io/helm-chart-sonarqube
    chart: sonarqube
    targetRevision: 2026.3.1
    helm:
      releaseName: sonarqube
      valuesObject:
        community:
          enabled: true
        service:
          type: ClusterIP
          externalPort: 9000
        ingress:
          enabled: false
        persistence:
          enabled: true
          storageClass: local-path
          size: 10Gi
        # vm.max_map_count is set on the Talos node, so skip the privileged
        # init container.
        initSysctl:
          enabled: false
        # The chart's init-fs container chowns data/temp/logs to 1000:0 but NOT
        # /opt/sonarqube/extensions. local-path (hostPath) volumes ignore POSIX
        # fsGroup, so the extensions subPath stays root-owned and SonarQube
        # (UID 1000) can't create extensions/downloads — "Background
        # initialization failed. Stopping SonarQube". Chown it explicitly here,
        # mirroring init-fs's baseline-compatible securityContext.
        extraInitContainers:
          - name: init-fs-extensions
            image: busybox:1.36
            command: ["sh", "-c", "chown -R 1000:0 /opt/sonarqube/extensions"]
            securityContext:
              runAsUser: 0
              runAsNonRoot: false
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              seccompProfile:
                type: RuntimeDefault
              capabilities:
                drop: ["ALL"]
                add: ["CHOWN"]
            volumeMounts:
              - name: sonarqube
                mountPath: /opt/sonarqube/extensions
                subPath: extensions
        jdbcOverwrite:
          enabled: true
          jdbcUrl: jdbc:postgresql://sonarqube-postgres-rw.sonarqube.svc.cluster.local:5432/sonarqube
          jdbcUsername: sonarqube
          jdbcSecretName: sonarqube-postgres-app
          jdbcSecretPasswordKey: password
        # Native SonarQube Prometheus metrics, scraped via the chart's
        # PodMonitor (Prometheus podMonitorSelector is empty, so it's picked
        # up). The endpoint is guarded by the monitoring passcode.
        monitoringPasscodeSecretName: sonarqube-monitoring
        monitoringPasscodeSecretKey: passcode
        prometheusMonitoring:
          podMonitor:
            enabled: true
            interval: 30s
  destination:
    server: https://kubernetes.default.svc
    namespace: sonarqube
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
