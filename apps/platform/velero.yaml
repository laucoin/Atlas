# Velero ships PV contents + cluster manifests offsite via an S3-
# compatible bucket. Before this Application syncs:
#   - Provision the bucket (Backblaze B2, AWS S3, Wasabi, Cloudflare R2,
#     MinIO elsewhere, …) and create access creds scoped to it.
#   - Replace the three REPLACE_ME_* placeholders below
#     (bucket name, region, s3Url).
#   - Populate VELERO_S3_ACCESS_KEY and VELERO_S3_SECRET_KEY in
#     Infisical (atlas / prod) — velero-externalsecret.yaml renders
#     them into the AWS-credentials-file format the chart expects.
#
# Backups are file-system based (restic/node-agent) because local-path
# PVCs have no CSI snapshot capability. defaultVolumesToFsBackup makes
# every volume opt-in by default; exclude with the annotation
# `backup.velero.io/backup-volumes-excludes` on the pod spec.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: velero
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://vmware-tanzu.github.io/helm-charts
    chart: velero
    targetRevision: 12.0.3
    helm:
      releaseName: velero
      valuesObject:
        credentials:
          useSecret: true
          existingSecret: velero-credentials
        configuration:
          backupStorageLocation:
            - name: default
              provider: aws
              bucket: atlas-backups
              config:
                # Cloudflare R2: region must be "auto" (R2 ignores real regions;
                # WEUR is only the data-location hint). s3Url is the ACCOUNT
                # endpoint with no bucket path — the bucket is addressed via
                # path-style. checksumAlgorithm must be "" because R2 rejects the
                # AWS SDK's default CRC32 upload checksum (backups fail otherwise).
                region: auto
                s3ForcePathStyle: true
                s3Url: https://298749e73a6230c5c6d83954957f8ba8.r2.cloudflarestorage.com
                checksumAlgorithm: ""
          volumeSnapshotLocation:
            - name: default
              provider: aws
              config:
                region: auto
          defaultVolumesToFsBackup: true
        deployNodeAgent: true
        # Expose Velero + node-agent metrics to Prometheus. Picked up by the
        # cluster-wide serviceMonitorSelector ({}), and rendered by the Velero
        # Grafana dashboard (gnetId 15469).
        metrics:
          enabled: true
          serviceMonitor:
            enabled: true
          nodeAgentPodMonitor:
            enabled: true
        initContainers:
          - name: velero-plugin-for-aws
            image: velero/velero-plugin-for-aws:v1.10.0
            imagePullPolicy: IfNotPresent
            volumeMounts:
              - mountPath: /target
                name: plugins
  destination:
    server: https://kubernetes.default.svc
    namespace: velero
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
