# Harbor's admin password is sourced from Infisical via ESO
# (see ./harbor-externalsecret.yaml); HARBOR_ADMIN_PASSWORD is generated by
# the infisical-seeder Job, so no manual step is needed.
#
# OIDC integration with Authentik is fully automated: the Authentik side is
# declared in ../identity/authentik-blueprints.yaml (registry-provider +
# `harbor` application), its client ID/secret are materialized by
# ./harbor-oidc-externalsecret.yaml, and ./harbor-oidc-config.yaml applies
# the OIDC + auth-mode settings to Harbor via its API on each sync.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: harbor
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://helm.goharbor.io
    chart: harbor
    targetRevision: 1.19.1
    helm:
      releaseName: harbor
      valuesObject:
        expose:
          type: clusterIP
          tls:
            enabled: false
        externalURL: https://harbor.atlas.laucoin.fr
        existingSecretAdminPassword: harbor-bootstrap
        existingSecretAdminPasswordKey: HARBOR_ADMIN_PASSWORD
        persistence:
          enabled: true
          persistentVolumeClaim:
            registry:
              storageClass: local-path
              size: 50Gi
            jobservice:
              jobLog:
                storageClass: local-path
                size: 1Gi
            database:
              storageClass: local-path
              size: 5Gi
            redis:
              storageClass: local-path
              size: 1Gi
            trivy:
              storageClass: local-path
              size: 5Gi
        trivy:
          enabled: true
        metrics:
          enabled: true
          serviceMonitor:
            enabled: true
  destination:
    server: https://kubernetes.default.svc
    namespace: harbor
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
