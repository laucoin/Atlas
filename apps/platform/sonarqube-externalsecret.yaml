# SonarQube's monitoring passcode (sonar.web.systemPasscode), materialized by
# ESO from the Infisical /sonarqube folder (generated by the infisical-seeder
# Job; see ../platform/infisical-seeder.yaml). Consumed by sonarqube.yaml via
# monitoringPasscodeSecretName, and used as the Bearer token the chart's
# PodMonitor presents to /api/monitoring/metrics.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: sonarqube-monitoring
  namespace: sonarqube
  annotations:
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  refreshInterval: 1m
  secretStoreRef:
    name: infisical-sonarqube
    kind: ClusterSecretStore
  target:
    name: sonarqube-monitoring
    creationPolicy: Owner
  data:
    - secretKey: passcode
      remoteRef: { key: SONARQUBE_MONITORING_PASSCODE }
