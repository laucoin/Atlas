# Harbor's local admin password, materialized by ESO from the Infisical
# /harbor folder (seeded by the infisical-seeder Job). Consumed by harbor.yaml
# via existingSecretAdminPassword.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: harbor-bootstrap
  namespace: harbor
  annotations:
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  refreshInterval: 1m
  secretStoreRef:
    name: infisical-harbor
    kind: ClusterSecretStore
  target:
    name: harbor-bootstrap
    creationPolicy: Owner
  data:
    - secretKey: HARBOR_ADMIN_PASSWORD
      remoteRef: { key: HARBOR_ADMIN_PASSWORD }
