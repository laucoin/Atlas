# Velero's S3 credentials, materialized by ESO from the Infisical /velero folder
# into the AWS credentials-file format the Velero chart expects. These two keys
# are account-specific (not random), so you set them by hand in Infisical — they
# are the only secrets the seeder does not generate.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: velero-credentials
  namespace: velero
  annotations:
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  refreshInterval: 1m
  secretStoreRef:
    name: infisical-velero
    kind: ClusterSecretStore
  target:
    name: velero-credentials
    creationPolicy: Owner
    template:
      type: Opaque
      data:
        cloud: |
          [default]
          aws_access_key_id={{ .access_key }}
          aws_secret_access_key={{ .secret_key }}
  data:
    - secretKey: access_key
      remoteRef: { key: VELERO_S3_ACCESS_KEY }
    - secretKey: secret_key
      remoteRef: { key: VELERO_S3_SECRET_KEY }
