# One-shot, idempotent seeder (Argo Sync hook) that generates every random
# secret Atlas needs and writes it into Infisical (project atlas, env prod),
# organised into one folder per service: /authentik, /harbor, /grafana,
# /argocd, /sonarqube. It replaces the manual "run openssl, paste into the UI"
# steps. Each key is created only if absent, so re-running never overwrites or
# rotates a live value. It authenticates with the write-capable `seeder`
# Universal Auth identity from the `infisical-seeder-credentials` Secret (create
# it once out-of-band, in this namespace). Human-chosen secrets are NOT seeded:
# /velero VELERO_S3_ACCESS_KEY and VELERO_S3_SECRET_KEY are set by hand — but the
# empty /velero folder is created so its ClusterSecretStore validates.
#
# NOTE on the Infisical API (v0.x raw-secrets/folders): the folders endpoint and
# the raw-secrets write endpoint key the project by `workspaceId` (the project
# UUID), not by slug, and a secret's folder must exist before the secret can be
# written (no implicit folder creation). So the script resolves the workspaceId
# from the slug, creates each folder first, then writes secrets by workspaceId.
apiVersion: batch/v1
kind: Job
metadata:
  name: infisical-seeder
  namespace: infisical
  annotations:
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  backoffLimit: 10
  ttlSecondsAfterFinished: 600
  template:
    metadata:
      name: infisical-seeder
    spec:
      restartPolicy: OnFailure
      containers:
        - name: seeder
          image: alpine:3.20
          envFrom:
            - secretRef:
                name: infisical-seeder-credentials
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -eu
              apk add --no-cache curl jq openssl >/dev/null

              API="http://infisical-infisical-standalone-infisical.infisical.svc.cluster.local:8080"
              PROJECT_SLUG="atlas"
              ENVIRONMENT="prod"

              until curl -sf "$API/api/status" >/dev/null 2>&1; do echo "waiting for Infisical..."; sleep 5; done

              TOKEN=$(curl -sf -X POST "$API/api/v1/auth/universal-auth/login" \
                -H 'Content-Type: application/json' \
                -d "{\"clientId\":\"$clientId\",\"clientSecret\":\"$clientSecret\"}" | jq -r .accessToken)
              [ -n "$TOKEN" ] && [ "$TOKEN" != "null" ] || { echo "login failed"; exit 1; }

              # The folders/raw-secrets APIs need the project UUID, not the slug.
              WSID=$(curl -sf -H "Authorization: Bearer $TOKEN" "$API/api/v1/workspace" \
                | jq -r ".workspaces[] | select(.slug==\"$PROJECT_SLUG\") | .id")
              [ -n "$WSID" ] && [ "$WSID" != "null" ] || { echo "project '$PROJECT_SLUG' not found"; exit 1; }

              rnd() { openssl rand -base64 "$1" | tr -dc 'A-Za-z0-9' | cut -c1-"$2"; }

              # Create a top-level folder; a duplicate returns 400, which we treat
              # as "already exists" (idempotent). A genuinely missing folder later
              # makes the secret write fail loudly, so masking this is safe.
              mkfolder() {
                code=$(curl -s -o /dev/null -w '%{http_code}' -X POST "$API/api/v1/folders" \
                  -H "Authorization: Bearer $TOKEN" -H 'Content-Type: application/json' \
                  -d "{\"workspaceId\":\"$WSID\",\"environment\":\"$ENVIRONMENT\",\"name\":\"$1\",\"path\":\"/\"}")
                case "$code" in
                  200|201) echo "  + folder /$1 (created)";;
                  *)       echo "  = folder /$1 (kept)";;
                esac
              }

              ensure() {
                path="$1"; name="$2"; value="$3"
                code=$(curl -s -o /dev/null -w '%{http_code}' -G -H "Authorization: Bearer $TOKEN" \
                  --data-urlencode "workspaceId=$WSID" --data-urlencode "environment=$ENVIRONMENT" \
                  --data-urlencode "secretPath=$path" "$API/api/v3/secrets/raw/$name")
                if [ "$code" = "200" ]; then echo "  = $path/$name (kept)"; return; fi
                curl -sf -X POST "$API/api/v3/secrets/raw/$name" -H "Authorization: Bearer $TOKEN" \
                  -H 'Content-Type: application/json' \
                  -d "{\"workspaceId\":\"$WSID\",\"environment\":\"$ENVIRONMENT\",\"secretPath\":\"$path\",\"secretValue\":\"$value\"}" >/dev/null
                echo "  + $path/$name (created)"
              }

              # /velero holds only human-chosen S3 creds (set by hand in Phase 9),
              # but the empty folder is created so its ClusterSecretStore validates.
              for f in authentik harbor grafana argocd sonarqube velero; do mkfolder "$f"; done

              ensure /authentik AUTHENTIK_SECRET_KEY          "$(rnd 90 80)"
              ensure /authentik AUTHENTIK_BOOTSTRAP_PASSWORD  "$(rnd 48 40)"
              ensure /authentik AUTHENTIK_BOOTSTRAP_TOKEN     "$(rnd 48 40)"
              ensure /authentik AUTHENTIK_POSTGRESQL__PASSWORD "$(rnd 48 40)"

              ensure /harbor    HARBOR_ADMIN_PASSWORD         "Aa1$(rnd 36 28)"
              ensure /harbor    HARBOR_OIDC_CLIENT_ID         "$(rnd 48 40)"
              ensure /harbor    HARBOR_OIDC_CLIENT_SECRET     "$(rnd 96 80)"

              ensure /grafana   GRAFANA_ADMIN_USER            "admin"
              ensure /grafana   GRAFANA_ADMIN_PASSWORD        "$(rnd 48 40)"
              ensure /grafana   GRAFANA_OIDC_CLIENT_ID        "$(rnd 48 40)"
              ensure /grafana   GRAFANA_OIDC_CLIENT_SECRET    "$(rnd 96 80)"

              ensure /argocd    ARGOCD_OIDC_CLIENT_ID         "$(rnd 48 40)"
              ensure /argocd    ARGOCD_OIDC_CLIENT_SECRET     "$(rnd 96 80)"

              ensure /sonarqube SONARQUBE_MONITORING_PASSCODE "$(rnd 48 40)"

              echo "Done."
