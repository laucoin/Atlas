# Harbor's OIDC client credentials, materialized by ESO from the Infisical
# /harbor folder (seeded by the infisical-seeder Job). The same values are read
# by Authentik (registry-provider) so the handshake always matches. Consumed by
# the harbor-oidc-config Job.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: harbor-oidc
  namespace: harbor
  annotations:
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  refreshInterval: 1m
  secretStoreRef:
    name: infisical-harbor
    kind: ClusterSecretStore
  target:
    name: harbor-oidc
    creationPolicy: Owner
  data:
    - secretKey: HARBOR_OIDC_CLIENT_ID
      remoteRef: { key: HARBOR_OIDC_CLIENT_ID }
    - secretKey: HARBOR_OIDC_CLIENT_SECRET
      remoteRef: { key: HARBOR_OIDC_CLIENT_SECRET }
